name: test-and-deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: slamface-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS (forced-command key)
        env:
          DEPLOY_KEY: ${{ secrets.SLAMFACE_DEPLOY_KEY }}
        run: |
          install -m 600 /dev/null deploy_key
          printf '%s\n' "$DEPLOY_KEY" > deploy_key
          # GitHub runner → Hostinger SSH is intermittently flaky (transient
          # connection timeouts); retry before failing the deploy.
          for attempt in 1 2 3 4 5; do
            if ssh -i deploy_key \
                   -o StrictHostKeyChecking=accept-new \
                   -o ConnectTimeout=20 \
                   deploy@2.25.209.57 deploy; then
              rm -f deploy_key
              exit 0
            fi
            echo "deploy attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          rm -f deploy_key
          echo "deploy failed after 5 attempts"; exit 1
